name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          AUTHKIT_DOMAIN: stub.example.com
          WORKOS_CLIENT_ID: client_stub
          WORKOS_API_KEY: sk_test_stub
          WORKOS_COOKIE_PASSWORD: ci-placeholder-secret-at-least-32chars

      - name: Test
        run: pnpm test
